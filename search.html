<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>检索 | 青柠工业</title>

    <link rel="stylesheet" href="web/style/style.css">
    <script src="web/class/EchoLiveTools.js"></script>
    <script src="web/class/DataFilter.js"></script>
</head>
<body>

<div class="container">
    <h1>
        青柠工业
        <span class="h1-subtitle">/ 检索</span>
    </h1>

    <div class="toolbar">
        <button id="toggle-mode">
            自定义检索语句
        </button>
    </div>

    <div id="normal-search">

        <input
            id="keyword-input"
            type="text"
            placeholder="关键词..."
        >

        <div id="tag-groups"></div>

    </div>

    <div id="advanced-search" class="hidden">

        <textarea
            id="query-input"
            placeholder="检索语句..."
        ></textarea>

    </div>

    <div class="result-info">
        共 <span id="result-count">0</span> 个结果
    </div>

    <div id="result-list"></div>

    <hr class="footer-hr">

    <footer>
        <div>
            <a href="https://github.com/sheep-realms/lime-industry" target="_blank">GitHub 项目</a> | © 2026
            <a href="https://github.com/sheep-realms" target="_blank">Sheep-realms</a>
        </div>
        <br>
        <div>
            本站基于
            <a href="https://github.com/sheep-realms/untitled-db" target="_blank">Untitled DB</a>
            驱动
        </div>
        <br>
        <div>本作品纯属虚构，且与机械动力（Create）模组的背景设定无直接关联</div>
        <div>“青柠工业”及本作品中的登场人物名字、团体名、地名、设定等全部为虚构，与现实毫无关联</div>
        <div>本作品非 Minecraft 官方产品，未经 Mojang 或 Microsoft 批准或关联</div>
        <br>
        <div>如何让一个虚构作品网站的页脚看起来有很多内容？当然是写一段很长的免责声明</div>
        <div>不会写免责声明怎么办？现在打开一款视觉小说直接抄，把角色年龄那一条删了就行</div>
    </footer>

</div>

<script src="web/script/search.js"></script>

</body>
</html>
